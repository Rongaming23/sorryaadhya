<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uniserve CRM Login</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<div style="
max-width:450px;
margin:100px auto;
">

<div class="card">

<center>

<img
src="assets/logo.png"
width="90"
style="margin-bottom:15px;"
>

<h1>Uniserve CRM</h1>

<p style="margin-bottom:20px;">
Login to Continue
</p>

</center>

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Email"
>

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button
class="primary"
style="width:100%;"
onclick="login()"
>
Login
</button>

<br><br>

<button
class="success"
style="width:100%;"
onclick="register()"
>
Register Agent
</button>

<div
id="message"
style="
margin-top:15px;
text-align:center;
"
>
</div>

</div>

</div>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
