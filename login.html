<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNISERVE CRM Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#5B3FD3;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
width:1200px;
height:720px;
background:white;
display:grid;
grid-template-columns:55% 45%;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.left{

background:linear-gradient(135deg,#5633C8,#5D3FD3);

padding:70px;

display:flex;

flex-direction:column;

justify-content:center;

color:white;

}

.logo{

font-size:34px;

font-weight:800;

margin-bottom:25px;

letter-spacing:2px;

}

.tag{

font-size:18px;

letter-spacing:3px;

margin-bottom:15px;

opacity:.9;

}

.big{

font-size:72px;

font-weight:800;

line-height:1;

}

.green{

color:#5EEAD4;

}

.small{

margin-top:40px;

font-size:18px;

opacity:.85;

line-height:30px;

}

.right{

display:flex;

justify-content:center;

align-items:center;

background:white;

}

.login{

width:420px;

}

.login h1{

font-size:40px;

margin-bottom:40px;

color:#222;

}

label{

font-size:14px;

font-weight:600;

display:block;

margin-bottom:8px;

}

input{

width:100%;

padding:15px;

border:1px solid #ddd;

border-radius:8px;

font-size:15px;

margin-bottom:20px;

outline:none;

transition:.3s;

}

input:focus{

border-color:#4F46E5;

}

.password-box{

position:relative;

}

.password-box span{

position:absolute;

right:15px;

top:16px;

cursor:pointer;

font-size:18px;

}

.row{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

font-size:14px;

}

button{

width:100%;

padding:16px;

border:none;

background:#3F5AF2;

color:white;

font-size:16px;

font-weight:700;

border-radius:8px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#3248d4;

}

.version{

margin-top:30px;

text-align:center;

color:#888;

font-size:13px;

}

#msg{

margin-top:20px;

text-align:center;

font-weight:600;

color:red;

}

@media(max-width:900px){

.container{

width:100%;

height:100%;

grid-template-columns:1fr;

}

.left{

display:none;

}

.right{

padding:30px;

}

.login{

width:100%;

}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="logo">

UNISERVE

</div>

<div class="tag">

LOGIN TO ACCESS

</div>

<div class="big">

Customer

</div>

<div class="big">

Support

</div>

<div class="big green">

Management

</div>

<div class="big green">

System

</div>

<div class="small">

Professional Customer Relationship Management Platform

<br><br>

Realtime Cloud CRM Powered by Firebase

</div>

</div>

<div class="right">

<div class="login">

<h1>Login</h1>

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter password">

<span onclick="togglePassword()">👁</span>

</div>

<div class="row">

<label>

<input
type="checkbox"
style="width:auto;margin-right:8px;">

Remember Me

</label>

<a href="#" style="text-decoration:none;color:#3F5AF2">

Forgot Password?

</a>

</div>

<button onclick="login()">

LOGIN

</button>

<div id="msg"></div>

<div class="version">

CRM Version 5.0

<br><br>

Powered by UNISERVE

</div>

</div>

</div>

</div>

<script>

function togglePassword(){

const p=document.getElementById("password");

p.type=p.type==="password"
?"text"
:"password";

}

</script>

<!-- Firebase -->
<script type="module" src="firebase.js"></script>

<!-- Login Logic -->
<script type="module" src="auth.js"></script>

</body>
</html>
