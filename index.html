<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wow Case Crm By Uniserve</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white}
.container{padding:20px;max-width:1200px;margin:auto}

.card{background:#111827;padding:15px;border-radius:12px;margin-bottom:15px}

input,select,textarea{
width:100%;padding:10px;margin:5px 0;
background:#1e293b;color:white;border:1px solid #334155;border-radius:8px
}

button{padding:10px 15px;margin:5px;border-radius:8px;border:none;cursor:pointer}
.primary{background:#3b82f6;color:white}
.success{background:#22c55e;color:white}
.danger{background:#ef4444;color:white}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #1f2937}

pre{background:#0b1220;padding:10px;border-radius:10px;white-space:pre-wrap}
</style>
</head>

<body>

<body>

<!-- 🔐 LOGIN SCREEN (ADD HERE) -->
<div id="authBox" style="
position:fixed;
inset:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
color:white;
">

<h2>🔐 Admin Login</h2>

<input id="email" placeholder="Email" style="padding:10px;margin:5px;width:250px;">
<input id="password" type="password" placeholder="Password" style="padding:10px;margin:5px;width:250px;">

<button onclick="login()" style="padding:10px 20px;background:#3b82f6;color:white;border:none;">
Login
</button>

<p id="msg"></p>
</div>
  
<div class="container">

<div style="display:flex;justify-content:space-between;align-items:center;">
  <h2>🚀 Uniserve CRM Online v2</h2>

  <button onclick="logout()" style="
    background:#ef4444;
    color:white;
    padding:8px 12px;
    border:none;
    border-radius:6px;
  ">
    Logout
  </button>
</div>

<div class="card">
<h3>📈 Reports (Issue Wise Breakdown)</h3>
<div id="reportBox">Loading reports...</div>
</div>
  
<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="order" placeholder="Order ID">
<input id="date" placeholder="Enter Order Date">
<input id="outlet" placeholder="Outlet">

  
<textarea id="concern" placeholder="Customer Concern"></textarea>


  
<select id="issue">
<option>Missing Item</option>
<option>Cancel Request</option>
<option>Wrong Order</option>
<option>Delayed Order</option>
<option>Veg / Non-Veg Concern</option>
<option>Refund Request</option>
<option>Bulk Order Query</option>
<option>Complaint</option>
<option>Business Query</option>
<option>Food Quality Issue</option>
<option>Packaging Issue</option>
<option>Payment Issue</option>
<option>Outlet Complaint</option>
<option>Delivery Partner Issue</option>
<option>Instruction</option>
</select>

<select id="partner">
<option>Swiggy</option>
<option>Zomato</option>
<option>Magicpin</option>
<option>WowEats</option>
<option>Direct Outlet</option>
<option>Uber Eats</option>
</select>

<select id="agent">
<option>Parth</option>
<option>Riya</option>
<option>Biswajit</option>
<option>Soumili</option>
<option>Shayonika</option>
</select>

<button class="primary" onclick="addCase()">Generate Case</button>
<button class="success" onclick="copyCase()">Copy Case</button>
<button class="danger" onclick="clearForm()">Clear</button>
<button class="success" onclick="csv()">CSV</button>
<button class="success" onclick="whatsapp()">WhatsApp</button>

</div>

<div class="card">
<h3>📄 Case Note</h3>
<pre id="note">No case generated</pre>
</div>

<div class="card">
<h3>📁 Cases</h3>

<input id="search" placeholder="Search Order ID..." onkeyup="filter()">

<table>
<thead>
<tr>
<th>Id</th>
<th>Phone</th>
<th>Name</th>
<th>Order</th>
<th>Issue</th>
<th>Partner</th>
<th>Agent</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</div>

<script type="module">

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
query,
orderBy,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAdR4XaDcs2M7o43j2pu6K1zA3FhCrK-cA",
authDomain: "customerdetailsuniserve.firebaseapp.com",
projectId: "customerdetailsuniserve",
storageBucket: "customerdetailsuniserve.firebasestorage.app",
messagingSenderId: "125960501611",
appId: "1:125960501611:web:4fbbe720ce8a063afbb42e",
measurementId: "G-YK03S135FK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.login = async function(){

let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth, email, pass);
document.getElementById("msg").innerText = "Login success";
}catch(e){
document.getElementById("msg").innerText = "❌ " + e.message;
}
}

let userRole = "agent";

onAuthStateChanged(auth,(user)=>{
if(user){

// SIMPLE ROLE SYSTEM
if(user.email === "parth@uniservecrm.com"){
userRole = "admin";
}else{
userRole = "agent";
}

document.getElementById("authBox").style.display="none";
}else{
document.getElementById("authBox").style.display="flex";
}
});


window.logout = function(){
signOut(auth);
}
const ref = collection(db,"cases");

let allData = [];
let lastNote = "";

/* all right for uniserve */
const get = id => document.getElementById(id).value;

/* all right for uniserve */
window.addCase = async function(){

const data = {
name:get("name"),
phone:get("phone"),
order:get("order"),
date:get("date"),
outlet:get("outlet"),
concern:get("concern"),
issue:get("issue"),
partner:get("partner"),
agent:get("agent"),
time:serverTimestamp()
};

if(!data.name || !data.order){
alert("Name & Order required");
return;
}


  
await addDoc(ref,data);

/* case section dont play otherwise Parth will kill you */
lastNote =
`Name: ${data.name}
Phone: ${data.phone}
Order: ${data.order}
Date: ${data.date}
Outlet: ${data.outlet}
Issue: ${data.issue} : Concern: ${data.concern}
Partner: ${data.partner}`;

document.getElementById("note").innerText = lastNote;

clearForm();
}

  
function updateReports(){

let map = {};

allData.forEach(x=>{
let key = x.issue || "Unknown";
map[key] = (map[key] || 0) + 1;
});

let html = "";

Object.keys(map).forEach(issue=>{
html += `
<div style="
background:#1e293b;
padding:10px;
margin:5px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
">
<span>${issue}</span>
<b>${map[issue]}</b>
</div>`;
});

document.getElementById("reportBox").innerHTML = html || "No data";
}
  
  
/* all right for uniserve */
onSnapshot(query(ref,orderBy("time","desc")),(snap)=>{

allData=[];
let html="";
let i=1;

snap.forEach(d=>{
let x=d.data();
allData.push(x);

html+=`
<tr>
<td>CX${String(i++).padStart(5,"0")}</td>
<td>${x.phone}</td>
<td>${x.name}</td>
<td>${x.order}</td>
<td>${x.issue}</td>
<td>${x.partner}</td>
<td>${x.agent}</td>
${userRole === "admin" 
? `<button class="danger" onclick="del('${d.id}')">Delete</button>` 
: `<span style="color:#64748b;">No Access</span>`
}
</tr>`;
});

document.getElementById("table").innerHTML=html;

/* all right for uniserve */
updateReports();

});

/* all right for uniserve */
window.del = async function(id){

if(userRole !== "admin"){
alert("❌ Only admin can delete cases");
return;
}

await deleteDoc(doc(db,"cases",id));
}

/* all right for uniserve */
window.copyCase = function(){
navigator.clipboard.writeText(lastNote || "");
}

/* all right for uniserve */
window.clearForm = function(){
document.querySelectorAll("input,textarea").forEach(e=>e.value="");
}

/* all right for uniserve */
window.csv = function(){
let csv="Name,Order,Issue,Partner,Agent\n";
allData.forEach(x=>{
csv+=`${x.name},${x.order},${x.issue},${x.partner},${x.agent}\n`;
});
let b=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="cases.csv";
a.click();
}

/* all right for uniserve */
window.whatsapp = function(){
window.open("https://wa.me/?text="+encodeURIComponent(lastNote));
}

/* all right for uniserve */
window.filter = function(){
let v=document.getElementById("search").value.toLowerCase();
document.querySelectorAll("tbody tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
});
}

</script>
<footer style="
margin-top:40px;
text-align:center;
padding:20px;
color:#cbd5e1;
font-size:14px;
background:rgba(255,255,255,0.03);
border-radius:12px;
backdrop-filter:blur(10px);
">
  Built with by <b>Parth</b> • Uniserve System v2 © 2026
</footer>
</body>
</html>
