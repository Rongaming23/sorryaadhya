<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wow Cx Data Dashboard Pro By Parth</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

:root{
--bg:#0f172a;
--card:#111827;
--card2:#1e293b;
--accent:#3b82f6;
--success:#22c55e;
--danger:#ef4444;
--text:#f8fafc;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:var(--text);
min-height:100vh;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
box-shadow:0 8px 30px rgba(0,0,0,.2);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat-card{
padding:20px;
border-radius:16px;
background:var(--card);
}

.stat-card h2{
font-size:32px;
margin-top:10px;
}

.main{
display:grid;
grid-template-columns:1.3fr 1fr;
gap:20px;
}

textarea,input,select{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
background:var(--card2);
border:1px solid #334155;
border-radius:10px;
color:white;
}

textarea{
height:180px;
resize:none;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
margin-right:10px;
margin-bottom:10px;
font-weight:600;
}

.primary{
background:var(--accent);
color:white;
}

.success{
background:var(--success);
color:white;
}

.danger{
background:var(--danger);
color:white;
}

.output{
background:var(--card2);
padding:15px;
border-radius:10px;
white-space:pre-wrap;
min-height:250px;
}

.history{
max-height:300px;
overflow:auto;
margin-top:15px;
}

.history-item{
padding:10px;
border-bottom:1px solid #334155;
}

@media(max-width:900px){
.main{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🎫 Customer Support Dashboard Pro</h1>
</div>

<div class="stats">

<div class="stat-card">
<div>Total Cases</div>
<h2 id="totalCases">0</h2>
</div>

<div class="stat-card">
<div>Refund Requests</div>
<h2 id="refundCases">0</h2>
</div>

<div class="stat-card">
<div>Complaints</div>
<h2 id="complaintCases">0</h2>
</div>

<div class="stat-card">
<div>Escalations</div>
<h2 id="escalationCases">0</h2>
</div>

</div>

<div class="main">

<div class="card">

<h2>Customer Details</h2>

<textarea id="rawData"
placeholder="Paste customer details here..."></textarea>

<button class="primary" onclick="autoFill()">
Auto Fill
</button>

<div class="row">

<div>
<label>Name</label>
<input id="name">
</div>

<div>
<label>Phone Number</label>
<input id="phone">
</div>

<div>
<label>Order ID</label>
<input id="orderId">
</div>

<div>
<label>Order Place</label>
<input id="orderPlace">
</div>

<div>
<label>Outlet</label>
<input id="outlet">
</div>

<div>
<label>Complain was</label>
<input id="complain">
</div>

</div>

<label>Issue Type</label>

<select id="reason">

<option>Missing Item</option>
<option>Cancel Request</option>
<option>Wrong Order</option>
<option>Delayed Order</option>
<option>Veg / Non-Veg Concern</option>
<option>Refund Request</option>
<option>Bulk Order Query</option>
<option>Complaint</option>
<option>Business Query</option>
<option>Food Quality Issue</option>
<option>Packaging Issue</option>
<option>Payment Issue</option>
<option>Outlet Complaint</option>
<option>Delivery Partner Issue</option>
<option>Other</option>

</select>

<label>Priority</label>

<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<button class="primary" onclick="generateCase()">
Generate Case
</button>

<button class="success" onclick="copyCase()">
Copy
</button>

<button class="danger" onclick="clearForm()">
Clear
</button>

</div>

<div class="card">

<h2>Generated Note</h2>

<div id="output" class="output">
Generated case note will appear here...
</div>

<h2 style="margin-top:20px;">
Recent Cases
</h2>

<div id="history" class="history"></div>

</div>

</div>

<script>

function autoFill(){

let lines=document
.getElementById("rawData")
.value
.split(/\r?\n/)
.filter(Boolean);

document.getElementById("name").value = lines[0] || "";
document.getElementById("phone").value = lines[1] || "";
document.getElementById("orderId").value = lines[2] || "";
document.getElementById("orderPlace").value = lines[3] || "";
document.getElementById("outlet").value = lines[4] || "";
document.getElementById("complain").value = lines.slice(5).join(" ");

}

function generateCase(){

let note=
`Name : ${document.getElementById("name").value}
Phone Number : ${document.getElementById("phone").value}
Order ID : ${document.getElementById("orderId").value}
Order Place : ${document.getElementById("orderPlace").value}
Outlet : ${document.getElementById("outlet").value}

Issue Type : ${document.getElementById("reason").value}
Priority : ${document.getElementById("priority").value}

Complain :
${document.getElementById("complain").value}

Action Taken :
Customer was assisted and informed regarding the next steps.

Status :
Pending Review`;

document.getElementById("output").innerText = note;

saveHistory();
}

async function copyCase(){

await navigator.clipboard.writeText(
output.innerText
);

alert("Case copied successfully!");
}

function clearForm(){

document.querySelectorAll(
"input, textarea"
).forEach(e=>e.value="");

output.innerText=
"Generated case note will appear here...";
}

function saveHistory(){

let history=
JSON.parse(
localStorage.getItem("caseHistory")
|| "[]"
);

history.unshift({
name: document.getElementById("name").value,
issue: document.getElementById("reason").value,
date: new Date().toLocaleString()
});

history=history.slice(0,50);

localStorage.setItem(
"caseHistory",
JSON.stringify(history)
);

renderHistory();

updateStats();
}

function renderHistory(){

let history=
JSON.parse(
localStorage.getItem("caseHistory")
|| "[]"
);

document.getElementById(
"history"
).innerHTML=

history.map(item=>`
<div class="history-item">
<b>${item.name}</b><br>
${item.issue}<br>
<small>${item.date}</small>
</div>
`).join("");

}

function updateStats(){

let history=
JSON.parse(
localStorage.getItem("caseHistory")
|| "[]"
);

totalCases.innerText=
history.length;

refundCases.innerText=
history.filter(x=>
x.issue==="Refund Request"
).length;

complaintCases.innerText=
history.filter(x=>
x.issue.includes("Complaint")
).length;

escalationCases.innerText=
history.filter(x=>
x.issue!=="Business Query"
).length;

}

renderHistory();
updateStats();

</script>

</div>
</body>
</html>
