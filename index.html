<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Details Formatter</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:180px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    resize:vertical;
    font-size:14px;
}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    margin-right:10px;
}

.format-btn{
    background:#007bff;
    color:white;
}

.copy-btn{
    background:#28a745;
    color:white;
}

.output{
    margin-top:20px;
    background:#f8f9fa;
    border:1px solid #ddd;
    border-radius:8px;
    padding:15px;
    white-space:pre-line;
    min-height:120px;
}
</style>
</head>
<body>

<div class="container">
    <h2>Customer Details Formatter</h2>

    <p><b>Paste Details (One Per Line)</b></p>

    <textarea id="input" placeholder="Example:

Rahul Sharma
9876543210
123456789
Zomato
Wow Momo Salt Lake
Extra spicy"></textarea>

    <br>

    <button class="format-btn" onclick="formatDetails()">
        Format Details
    </button>

    <button class="copy-btn" onclick="copyOutput()">
        Copy Output
    </button>

    <div class="output" id="output">
Formatted details will appear here...
    </div>
</div>

<script>
function formatDetails() {

    let lines = document
        .getElementById("input")
        .value
        .split(/\r?\n/)
        .map(x => x.trim())
        .filter(x => x);

    let result =
`Name : ${lines[0] || ""}
Phone Number : ${lines[1] || ""}
Order ID : ${lines[2] || ""}
Order Place : ${lines[3] || ""}
Outlet : ${lines[4] || ""}
Instruction : ${lines.slice(5).join(" ") || ""}`;

    document.getElementById("output").innerText = result;
}

async function copyOutput() {

    let text = document.getElementById("output").innerText;

    try {
        await navigator.clipboard.writeText(text);
        alert("✅ Details copied successfully!");
    } catch {
        alert("❌ Unable to copy.");
    }
}
</script>

</body>
</html>
