<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNISERVE CRM Enterprise v3 Pro</title>

<style>
body{
margin:0;
font-family:Inter,Segoe UI;
background:#0b1220;
color:#e5e7eb;
}

/* LOGIN */
#authBox{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(2,6,23,0.95);
backdrop-filter:blur(12px);
z-index:9999;
}

#authBox input{
width:280px;
padding:12px;
margin:6px;
border-radius:10px;
border:1px solid #334155;
background:#111827;
color:#fff;
}

#authBox button{
width:280px;
padding:12px;
background:#3b82f6;
border:none;
border-radius:10px;
color:#fff;
font-weight:600;
}

/* MAIN */
.container{
padding:20px;
max-width:1200px;
margin:auto;
}

/* CARDS */
.card{
background:linear-gradient(145deg,#0f172a,#111827);
padding:16px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* INPUT */
input,select,textarea{
width:100%;
padding:12px;
margin:6px 0;
background:#0f172a;
color:#fff;
border:1px solid #334155;
border-radius:10px;
}

/* BUTTONS */
button{
padding:10px 14px;
margin:5px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:500;
}

.primary{background:#3b82f6;color:#fff;}
.success{background:#22c55e;color:#fff;}
.danger{background:#ef4444;color:#fff;}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#111827;
padding:12px;
font-size:13px;
text-transform:uppercase;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #1f2937;
}

tr:hover{background:#111827;}
pre{white-space:pre-wrap;background:#0f172a;padding:12px;border-radius:10px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authBox">
<h2>🔐 UNISERVE CRM LOGIN</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<div class="container">

<div style="display:flex;justify-content:space-between;align-items:center;">
<h2>🚀 UNISERVE CRM Enterprise v3 Pro</h2>
<button class="danger" onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>📈 Live Reports</h3>
<div id="reportBox">Loading...</div>
</div>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="order" placeholder="Order ID">
<input id="date" placeholder="Order Date">
<input id="outlet" placeholder="Outlet">

<textarea id="concern" placeholder="Customer Concern"></textarea>

<select id="issue">
<option>Missing Item</option>
<option>Cancel Request</option>
<option>Wrong Order</option>
<option>Delayed Order</option>
<option>Veg / Non-Veg Concern</option>
<option>Refund Request</option>
<option>Bulk Order Query</option>
<option>Complaint</option>
<option>Business Query</option>
<option>Food Quality Issue</option>
<option>Packaging Issue</option>
<option>Payment Issue</option>
<option>Outlet Complaint</option>
<option>Delivery Partner Issue</option>
<option>Instruction</option>
</select>

<select id="partner">
<option>Swiggy</option>
<option>Zomato</option>
<option>Magicpin</option>
<option>WowEats</option>
<option>Direct Outlet</option>
<option>Uber Eats</option>
</select>

<select id="agent">
<option>Parth</option>
<option>Riya</option>
<option>Biswajit</option>
<option>Soumili</option>
<option>Shayonika</option>
</select>

<button class="primary" onclick="addCase()">Generate Case</button>
<button class="success" onclick="copyCase()">Copy</button>
<button class="danger" onclick="clearForm()">Clear</button>
<button class="success" onclick="csv()">CSV</button>
<button class="success" onclick="whatsapp()">WhatsApp</button>

</div>

<div class="card">
<h3>📄 Case Note</h3>
<pre id="note">No case generated</pre>
</div>

<div class="card">
<h3>📁 Cases</h3>
<input id="search" placeholder="Search..." onkeyup="filter()">

<table>
<thead>
<tr>
<th>ID</th>
<th>Phone</th>
<th>Name</th>
<th>Order</th>
<th>Issue</th>
<th>Partner</th>
<th>Agent</th>
<th>Created By</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
query,
orderBy,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey: "AIzaSyAdR4XaDcs2M7o43j2pu6K1zA3FhCrK-cA",
authDomain: "customerdetailsuniserve.firebaseapp.com",
projectId: "customerdetailsuniserve",
storageBucket: "customerdetailsuniserve.firebasestorage.app",
messagingSenderId: "125960501611",
appId: "1:125960501611:web:4fbbe720ce8a063afbb42e"
});

const db = getFirestore(app);
const auth = getAuth(app);
const ref = collection(db,"cases");

let allData = [];
let lastNote = "";
let userRole = "agent";

/* LOGIN */
window.login = async function(){
try{
await signInWithEmailAndPassword(
auth,
email.value,
password.value
);
msg.innerText = "Login Success";
}catch(e){
msg.innerText = e.message;
}
};

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user){
userRole = user.email === "sankudas@crm.com" ? "admin" : "agent";
authBox.style.display="none";
}else{
authBox.style.display="flex";
}
});

/* LOGOUT */
window.logout = ()=>signOut(auth);

/* ADD CASE */
window.addCase = async function(){

const data = {
name:name.value,
phone:phone.value,
order:order.value,
date:date.value,
outlet:outlet.value,
concern:concern.value,
issue:issue.value,
partner:partner.value,
agent:agent.value,
createdBy:auth.currentUser?.email || "unknown",
time:serverTimestamp()
};

if(!data.name || !data.order){
alert("Name & Order required");
return;
}

await addDoc(ref,data);

lastNote =
`Name: ${data.name}
Phone: ${data.phone}
Order: ${data.order}
Date: ${data.date}
Outlet: ${data.outlet}
Issue: ${data.issue}
Concern: ${data.concern}
Partner: ${data.partner}`;

note.innerText = lastNote;
clearForm();
};

/* SNAPSHOT */
onSnapshot(query(ref,orderBy("time","desc")), snap=>{
allData = [];
let html="";
let i=1;

snap.forEach(d=>{
let x=d.data();
x._id=d.id;

if(userRole==="admin" || x.createdBy===auth.currentUser?.email){
allData.push(x);
}
});

allData.forEach(x=>{
html+=`
<tr>
<td>CX${String(i++).padStart(5,"0")}</td>
<td>${x.phone||""}</td>
<td>${x.name||""}</td>
<td>${x.order||""}</td>
<td>${x.issue||""}</td>
<td>${x.partner||""}</td>
<td>${x.agent||""}</td>
<td>${x.createdBy||""}</td>
<td>
${userRole==="admin"
? `<button class="danger" onclick="del('${x._id}')">Delete</button>`
: "No Access"}
</td>
</tr>`;
});

table.innerHTML = html;
updateReports();
});

/* DELETE */
window.del = async function(id){
if(userRole!=="admin") return alert("Admin only");
await deleteDoc(doc(db,"cases",id));
};

/* REPORT */
function updateReports(){
let map={};
allData.forEach(x=>{
map[x.issue]=(map[x.issue]||0)+1;
});

reportBox.innerHTML = Object.keys(map)
.map(k=>`<div>${k} - <b>${map[k]}</b></div>`)
.join("") || "No Data";
}

/* COPY */
window.copyCase = ()=>navigator.clipboard.writeText(lastNote);

/* CLEAR */
window.clearForm = ()=>{
[name,phone,order,date,outlet,concern].forEach(i=>i.value="");
};

/* CSV */
window.csv = ()=>{
let csv="Name,Order,Issue,Partner,Agent\n";
allData.forEach(x=>{
csv+=`${x.name},${x.order},${x.issue},${x.partner},${x.agent}\n`;
});
let b=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="cases.csv";
a.click();
};

/* WHATSAPP */
window.whatsapp = ()=>{
window.open("https://wa.me/?text="+encodeURIComponent(lastNote));
};

/* FILTER */
window.filter = ()=>{
let v=search.value.toLowerCase();
document.querySelectorAll("tbody tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
});
};

</script>

</body>
</html>
