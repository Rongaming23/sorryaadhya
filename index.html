<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wow Case Crm By Uniserve</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white}
.container{padding:20px;max-width:1200px;margin:auto}

.card{background:#111827;padding:15px;border-radius:12px;margin-bottom:15px}

input,select,textarea{
width:100%;padding:10px;margin:5px 0;
background:#1e293b;color:white;border:1px solid #334155;border-radius:8px
}

button{padding:10px 15px;margin:5px;border-radius:8px;border:none;cursor:pointer}
.primary{background:#3b82f6;color:white}
.success{background:#22c55e;color:white}
.danger{background:#ef4444;color:white}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #1f2937}

pre{background:#0b1220;padding:10px;border-radius:10px;white-space:pre-wrap}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Uniserve CRM Online v2)</h2>

<div class="card">

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="order" placeholder="Order ID">
<input id="date" placeholder="Enter Order Date">
<input id="outlet" placeholder="Outlet">

  
<textarea id="concern" placeholder="Customer Concern"></textarea>


  
<select id="issue">
<option>Missing Item</option>
<option>Cancel Request</option>
<option>Wrong Order</option>
<option>Delayed Order</option>
<option>Veg / Non-Veg Concern</option>
<option>Refund Request</option>
<option>Bulk Order Query</option>
<option>Complaint</option>
<option>Business Query</option>
<option>Food Quality Issue</option>
<option>Packaging Issue</option>
<option>Payment Issue</option>
<option>Outlet Complaint</option>
<option>Delivery Partner Issue</option>
<option>Instruction</option>
</select>

<select id="partner">
<option>Swiggy</option>
<option>Zomato</option>
<option>Magicpin</option>
<option>WowEats</option>
<option>Direct Outlet</option>
<option>Uber Eats</option>
</select>

<select id="agent">
<option>Parth</option>
<option>Riya</option>
<option>Biswajit</option>
<option>Soumili</option>
<option>Shayonika</option>
</select>

<button class="primary" onclick="addCase()">Generate Case</button>
<button class="success" onclick="copyCase()">Copy Case</button>
<button class="danger" onclick="clearForm()">Clear</button>
<button class="success" onclick="csv()">CSV</button>
<button class="success" onclick="whatsapp()">WhatsApp</button>

</div>

<div class="card">
<h3>📄 Case Note</h3>
<pre id="note">No case generated</pre>
</div>

<div class="card">
<h3>📁 Cases</h3>

<input id="search" placeholder="Search Order ID..." onkeyup="filter()">

<table>
<thead>
<tr>
<th>Id</th>
<th>Phone</th>
<th>Name</th>
<th>Order</th>
<th>Issue</th>
<th>Partner</th>
<th>Agent</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
query,
orderBy,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAdR4XaDcs2M7o43j2pu6K1zA3FhCrK-cA",
authDomain: "customerdetailsuniserve.firebaseapp.com",
projectId: "customerdetailsuniserve",
storageBucket: "customerdetailsuniserve.firebasestorage.app",
messagingSenderId: "125960501611",
appId: "1:125960501611:web:4fbbe720ce8a063afbb42e",
measurementId: "G-YK03S135FK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = collection(db,"cases");

let allData = [];
let lastNote = "";

/* all right for uniserve */
const get = id => document.getElementById(id).value;

/* all right for uniserve */
window.addCase = async function(){

const data = {
name:get("name"),
phone:get("phone"),
order:get("order"),
date:get("date"),
outlet:get("outlet"),
concern:get("concern"),
issue:get("issue"),
partner:get("partner"),
agent:get("agent"),
time:serverTimestamp()
};

if(!data.name || !data.order){
alert("Name & Order required");
return;
}

await addDoc(ref,data);

/* case section dont play otherwise Parth will kill you */
lastNote =
`Name: ${data.name}
Phone: ${data.phone}
Order: ${data.order}
Date: ${data.date}
Outlet: ${data.outlet}
Issue: ${data.issue} : Concern: ${data.concern}
Partner: ${data.partner}`;

document.getElementById("note").innerText = lastNote;

clearForm();
}

/* all right for uniserve */
onSnapshot(query(ref,orderBy("time","desc")),(snap)=>{

allData=[];
let html="";
let i=1;

snap.forEach(d=>{
let x=d.data();
allData.push(x);

html+=`
<tr>
<td>CX${String(i++).padStart(5,"0")}</td>
<td>${x.phone}</td>
<td>${x.name}</td>
<td>${x.order}</td>
<td>${x.issue}</td>
<td>${x.partner}</td>
<td>${x.agent}</td>
<td><button class="danger" onclick="del('${d.id}')">Delete</button></td>
</tr>`;
});

document.getElementById("table").innerHTML=html;

});

/* all right for uniserve */
window.del = async function(id){
await deleteDoc(doc(db,"cases",id));
}

/* all right for uniserve */
window.copyCase = function(){
navigator.clipboard.writeText(lastNote || "");
}

/* all right for uniserve */
window.clearForm = function(){
document.querySelectorAll("input,textarea").forEach(e=>e.value="");
}

/* all right for uniserve */
window.csv = function(){
let csv="Name,Order,Issue,Partner,Agent\n";
allData.forEach(x=>{
csv+=`${x.name},${x.order},${x.issue},${x.partner},${x.agent}\n`;
});
let b=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="cases.csv";
a.click();
}

/* all right for uniserve */
window.whatsapp = function(){
window.open("https://wa.me/?text="+encodeURIComponent(lastNote));
}

/* all right for uniserve */
window.filter = function(){
let v=document.getElementById("search").value.toLowerCase();
document.querySelectorAll("tbody tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
});
}

</script>
<footer style="
margin-top:40px;
text-align:center;
padding:20px;
color:#cbd5e1;
font-size:14px;
background:rgba(255,255,255,0.03);
border-radius:12px;
backdrop-filter:blur(10px);
">
  Built with by <b>Parth</b> • Uniserve System v2 © 2026
</footer>
</body>
</html>
