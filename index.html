<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uniserve CRM PRO LIVE</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white}
.container{padding:20px;max-width:1200px;margin:auto}

.card{background:#111827;padding:15px;border-radius:12px;margin-bottom:15px}

input,select,textarea{
width:100%;padding:10px;margin:5px 0;
background:#1e293b;color:white;border:1px solid #334155;border-radius:8px
}

button{padding:10px 15px;margin:5px;border-radius:8px;border:none;cursor:pointer}
.primary{background:#3b82f6;color:white}
.success{background:#22c55e;color:white}
.danger{background:#ef4444;color:white}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #1f2937}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Uniserve LIVE CRM (FULL FIXED)</h2>

<div class="card">

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="order" placeholder="Order ID">
<input id="outlet" placeholder="Outlet">

<textarea id="concern" placeholder="Customer Concern"></textarea>

<select id="issue">
<option>Missing Item</option>
<option>Cancel Request</option>
<option>Wrong Order</option>
<option>Delayed Order</option>
<option>Veg / Non-Veg Concern</option>
<option>Refund Request</option>
<option>Complaint</option>
<option>Outlet Complaint</option>
</select>

<select id="partner">
<option>Swiggy</option>
<option>Zomato</option>
<option>Magicpin</option>
<option>Direct Outlet</option>
</select>

<select id="agent">
<option>Parth</option>
<option>Riya</option>
<option>Biswajit</option>
<option>Soumili</option>
</select>

<button class="primary" onclick="addCase()">Generate Case</button>
<button class="success" onclick="copyCase()">Copy</button>
<button class="danger" onclick="clearForm()">Clear</button>
<button class="success" onclick="csv()">CSV</button>
<button class="success" onclick="whatsapp()">WhatsApp</button>

</div>

<div class="card">
<h3>📊 Stats</h3>
Total: <span id="total">0</span><br>
Refund: <span id="refund">0</span><br>
Complaint: <span id="complaint">0</span>
</div>

<div class="card">
<h3>📁 Cases</h3>
<input id="search" placeholder="Search Order ID..." onkeyup="render()">
<table>
<thead>
<tr>
<th>ID</th><th>Name</th><th>Issue</th><th>Partner</th><th>Agent</th><th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc,
onSnapshot, deleteDoc, doc,
query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAdR4XaDcs2M7o43j2pu6K1zA3FhCrK-cA",
authDomain: "customerdetailsuniserve.firebaseapp.com",
projectId: "customerdetailsuniserve",
storageBucket: "customerdetailsuniserve.firebasestorage.app",
messagingSenderId: "125960501611",
appId: "1:125960501611:web:4fbbe720ce8a063afbb42e",
measurementId: "G-YK03S135FK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = collection(db,"cases");

let allData = [];

function ticket(i){
return "CX" + String(i).padStart(6,"0");
}

// ================= ADD CASE =================
window.addCase = async function(){

const data = {
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
order:document.getElementById("order").value,
outlet:document.getElementById("outlet").value,
concern:document.getElementById("concern").value,
issue:document.getElementById("issue").value,
partner:document.getElementById("partner").value,
agent:document.getElementById("agent").value,
time:serverTimestamp()
};

if(!data.name || !data.order){
alert("Name & Order ID required");
return;
}

await addDoc(ref,data);

clearForm();
}

// ================= LIVE LOAD =================
onSnapshot(query(ref,orderBy("time","desc")),(snap)=>{

allData = [];

let html="";
let i=1;

snap.forEach(d=>{
let x=d.data();
allData.push(x);

html+=`
<tr>
<td>${ticket(i++)}</td>
<td>${x.name}</td>
<td>${x.issue}</td>
<td>${x.partner}</td>
<td>${x.agent}</td>
<td><button class="danger" onclick="del('${d.id}')">Delete</button></td>
</tr>`;
});

document.getElementById("table").innerHTML=html;

// stats
document.getElementById("total").innerText=allData.length;
document.getElementById("refund").innerText=allData.filter(x=>x.issue.includes("Refund")).length;
document.getElementById("complaint").innerText=allData.filter(x=>x.issue.includes("Complaint")).length;

});

// ================= DELETE =================
window.del = async function(id){
await deleteDoc(doc(db,"cases",id));
}

// ================= COPY =================
window.copyCase = function(){
navigator.clipboard.writeText(
`${name.value} | ${order.value} | ${issue.value} | ${partner.value}`
);
}

// ================= CLEAR =================
window.clearForm = function(){
document.querySelectorAll("input,textarea").forEach(x=>x.value="");
}

// ================= CSV =================
window.csv = function(){
let csv="Name,Order,Issue,Partner,Agent\n";
allData.forEach(x=>{
csv+=`${x.name},${x.order},${x.issue},${x.partner},${x.agent}\n`;
});
let b=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="cases.csv";
a.click();
}

// ================= WHATSAPP =================
window.whatsapp = function(){
window.open("https://wa.me/?text="+encodeURIComponent(
`${name.value} | ${order.value} | ${issue.value} | ${partner.value}`
));
}

</script>

</body>
</html>
